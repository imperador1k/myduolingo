<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código de Acesso</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #fbf9f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .main-container {
      background-color: #ffffff;
      border: 2px solid #e5e7eb;
      border-bottom: 6px solid #e5e7eb;
      border-radius: 20px;
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 30px;
      text-align: center;
    }
    .logo {
      width: 50px;
      margin-bottom: 20px;
    }
    .title {
      color: #374151;
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 30px 0;
      line-height: 1.3;
    }
    .otp-container {
      background-color: #f4f4f5;
      border: 2px solid #e5e7eb;
      border-bottom: 4px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px 10px;
      margin-bottom: 30px;
    }
    .otp-code {
      color: #58CC02;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 12px;
      margin: 0;
      line-height: 1;
    }
    .footer {
      color: #9ca3af;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      margin: 0;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <img src="{{app_logo}}" alt="LinguaPlay" class="logo">
    <h1 class="title">O teu código de acesso</h1>
    
    <div class="otp-container">
      <p class="otp-code">{{otp_code}}</p>
    </div>
    
    <p class="footer">Se não pediste este código, ignora este email. Continua a tua jornada de aprendizagem!</p>
  </div>
</body>
</html>
