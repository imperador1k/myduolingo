<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marco Chat Input Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: #f0f2f5; }
        .discord-token {
            background: rgba(88, 204, 2, 0.15);
            color: #58CC02;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            border: 1px solid rgba(88, 204, 2, 0.3);
        }
        .input-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px 16px;
            pointer-events: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: transparent;
            font-weight: 700;
        }
        .mirror .highlight {
            color: #58CC02;
            background: rgba(88, 204, 2, 0.1);
            border-radius: 4px;
            padding: 2px 4px;
            border: 1px solid rgba(88, 204, 2, 0.2);
        }
        .real-input {
            width: 100%;
            background: white;
            border: 2px solid #e5e7eb;
            border-bottom-width: 4px;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            outline: none;
            color: #374151; /* Normal text color */
        }
        /* The trick: hide specifically the text that is highlighted beneath */
        .token-text-hidden {
             visibility: hidden;
        }
    </style>
</head>
<body class="p-8 flex flex-col items-center gap-8">
    <div class="bg-white p-6 rounded-3xl shadow-xl border-2 border-stone-200 w-full max-w-md">
        <h1 class="text-xl font-black text-stone-700 mb-4 uppercase tracking-tight">Mockup: Input do Marco</h1>
        
        <p class="text-sm text-stone-500 mb-6 font-bold">Ao digitar "/docs", ele transforma-se visualmente:</p>

        <!-- Approach 1: Simple Background Highlight -->
        <div class="mb-8">
            <span class="text-xs font-black text-stone-400 uppercase">Estilo: Realce Suave</span>
            <div class="mt-2 relative">
                <div class="bg-stone-100 border-2 border-stone-200 border-b-4 rounded-2xl px-4 py-3 text-stone-700 font-bold flex items-center gap-2">
                    Olá Miguel, podes ver o <span class="bg-[#58CC02]/20 text-[#58CC02] px-2 py-0.5 rounded-md border border-[#58CC02]/30">/docs</span> para me ajudares?
                </div>
            </div>
        </div>

        <!-- Approach 2: Atomic Token (Discord Style) -->
        <div>
            <span class="text-xs font-black text-stone-400 uppercase">Estilo: Token Atómico (Discord)</span>
            <div class="mt-2">
                <div class="bg-stone-100 border-2 border-stone-200 border-b-4 rounded-2xl px-4 py-3 text-stone-700 font-bold flex flex-wrap items-center gap-2">
                    <span class="bg-[#58CC02] text-white px-2 py-1 rounded-lg text-sm flex items-center gap-1 shadow-sm">
                        <span class="text-xs">📖</span> /docs
                    </span>
                    <span>Como funcionam as ligas?</span>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center max-w-sm">
        <p class="font-bold text-stone-600">Qual destes estilos tinhas em mente?</p>
    </div>
</body>
</html>
